<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discover | Chamber of Commerce</title>

    <meta name="description" content="Discover local attractions, culture, and information about our community.">
    <meta name="author" content="Eduardo">

    <!-- Favicon -->
    <link rel="icon" href="../images/site-logo.svg">

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/small.css">
    <link rel="stylesheet" href="../styles/larger.css">
    <link rel="stylesheet" href="styles/discover.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Chamber of Commerce</h1>

        <button id="menu-button">☰</button>

        <nav class="navigation" id="nav-menu">
            <a href="../index.html">Home</a>
            <a href="directory.html">Directory</a>
            <a href="discover.html" class="active" aria-current="page">Discover</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <h2>Discover Our Community</h2>

        <!-- 🧠 VISIT MESSAGE -->
        <section class="visit">
            <p id="visit-message"></p>
        </section>

        <!-- 📍 LOCAL INFO -->
        <section class="info">
            <h3>About Our City</h3>
            <p>
                Our community is known for its vibrant culture, beautiful landscapes, and growing business environment.
                Visitors enjoy a mix of modern amenities and rich local traditions.
            </p>
        </section>

        <!-- 🖼️ IMAGE GALLERY -->
        <section class="gallery">

            <figure>
                <img src="images/discover1.jpg" alt="City view" loading="lazy">
                <figcaption>Beautiful city skyline</figcaption>
            </figure>

            <figure>
                <img src="images/discover2.jpg" alt="Local market" loading="lazy">
                <figcaption>Popular local market</figcaption>
            </figure>

            <figure>
                <img src="images/discover3.jpg" alt="Beach area" loading="lazy">
                <figcaption>Relaxing beach area</figcaption>
            </figure>

            <figure>
                <img src="images/discover4.jpg" alt="Cultural festival" loading="lazy">
                <figcaption>Annual cultural festival</figcaption>
            </figure>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Chamber of Commerce</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="../scripts/navigation.js" defer></script>
    <script src="scripts/discover.js" defer></script>

</body>

</html>

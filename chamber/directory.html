<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chamber of Commerce Business Directory</title>

    <meta name="description"
        content="Explore local businesses that are members of the Chamber of Commerce. View contact details, websites, and membership levels.">

    <meta name="author" content="Eduardo">

    <!-- Favicon -->
    <link rel="icon" href="../images/site-logo.svg">

    <!-- Open Graph for social media -->
    <meta property="og:title" content="Chamber of Commerce Business Directory">
    <meta property="og:description"
        content="Explore local businesses that are members of the Chamber of Commerce directory.">
    <meta property="og:image" content="https://mrknight2916.github.io/wdd231/images/site-logo.svg">
    <meta property="og:url" content="https://mrknight2916.github.io/wdd231/chamber/directory.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/small.css">
    <link rel="stylesheet" href="../styles/larger.css">

</head>

<body>

    <header>
        <h1>Chamber of Commerce</h1>
    </header>

    <main>
        <h2>Chamber Directory</h2>

        <div class="menu">
            <button id="grid" aria-label="Grid View">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
            </button>
        
            <button id="list" aria-label="List View">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="3"></rect>
                    <rect x="3" y="10" width="18" height="3"></rect>
                    <rect x="3" y="15" width="18" height="3"></rect>
                </svg>
            </button>
        </div>

        <section id="members" class="grid"></section>
    </main>

    <footer>
        <p>&copy; 2026 Chamber of Commerce</p>
    </footer>

    <script src="scripts/directory.js" defer></script>

</body>

</html>

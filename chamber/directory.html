<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Directory of businesses that are members of the Chamber of Commerce.">

    <title>Chamber Directory</title>

    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/small.css">
    <link rel="stylesheet" href="../styles/larger.css">
</head>

<body>

    <header>
        <h1>Chamber of Commerce</h1>
    </header>

    <main>
        <h2>Chamber Directory</h2>

        <div class="menu">
            <button id="grid" aria-label="Grid View">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
            </button>
        
            <button id="list" aria-label="List View">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="3"></rect>
                    <rect x="3" y="10" width="18" height="3"></rect>
                    <rect x="3" y="15" width="18" height="3"></rect>
                </svg>
            </button>
        </div>

        <section id="members" class="grid"></section>
    </main>

    <footer>
        <p>&copy; 2026 Chamber of Commerce</p>
    </footer>

    <script src="scripts/directory.js" defer></script>

</body>

</html>

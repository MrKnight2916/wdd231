<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Favorite Movies Collection - Spotlight of my top movies">
    <meta name="author" content="Eduardo">
    <title>Favorite Movies Collection</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">Movies Collection</div>
            <button class="hamburger">&#9776;</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="favorites.html">Favorites</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- SPOTLIGHT SECTION -->
        <section class="spotlight">
            <h2>Spotlight Movies</h2>
            <div id="spotlight" class="spotlight-cards">
                <!-- 3 spotlight movies dynamic cards go here -->
            </div>
        </section>

        <!-- MOVIE CATALOG -->
        <section class="movie-catalog">
            <h2>All Movies</h2>
            <div id="movies-container" class="movie-cards">
                <!-- All movies dynamic cards go here -->
            </div>
        </section>

        <!-- FAVORITES SECTION -->
        <section class="favorites">
            <h2>Your Favorite Movies</h2>
            <div id="favorites" class="favorite-cards">
                <!-- Favorites dynamic cards go here -->
            </div>
        </section>
    </main>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <!-- Dynamic content injected by JS -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Eduardo. <a href="#">Video Demo</a> | <a href="#">Attributions</a></p>
    </footer>

    <script src="scripts/main.js" type="module"></script>
</body>

</html>
